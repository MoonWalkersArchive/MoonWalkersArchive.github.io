<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link href="style.css" media="all" rel="stylesheet" type="text/css" />
  <title>MW Archive | Home</title>
  <meta content="The go-to place for internet stuff. Some links, some guides, and some spider webs." name="description" />
  <style>
    @font-face {
      font-family: jet;
      src: url(jetbrainsmono-regular.woff2);
    }

    * {
      font-family: jet;
    }

    #markdown-content {
      margin: 20px;
      padding: 10px;
      background-color: #f4f4f4;
      border-radius: 5px;
      font-size: 16px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="top-margin-container">
    <button class="myBtn2" id="scrollBackButton">
      <div>Scroll Back</div>
    </button>

    <div id="myBtn2" onclick="topFunction()" title="Go to top">
      <img src="up2.png" alt="" class="up_btn">
    </div>

    <div class="center_text">
      <h1>Welcome to MW Archive</h1>
      <p>This page is a collection of useful resources curated by MoonWalker440.</p>
    </div>

    <hr />

    <!-- Markdown content will be rendered here -->
    <div id="markdown-content">Loading content...</div>
  </div>

  <!-- JavaScript to load and render Markdown -->
  <script>
    async function loadMarkdown() {
      const markdownFile = 'https://raw.githubusercontent.com/MoonWalkersArchive/MoonWalkersArchive.github.io/main/Awesome%20Index.md'; // Update with your .md file URL

      try {
        const response = await fetch(markdownFile);
        if (!response.ok) {
          throw new Error(`Error fetching file: ${response.statusText}`);
        }
        const markdownText = await response.text();

        // Render Markdown content
        const converter = new showdown.Converter();
        const htmlContent = converter.makeHtml(markdownText);
        document.getElementById('markdown-content').innerHTML = htmlContent;
      } catch (error) {
        document.getElementById('markdown-content').innerHTML =
          `<p>Error loading Markdown file: ${error.message}</p>`;
      }
    }

    // Load Markdown on page load
    loadMarkdown();
  </script>

  <!-- Include Showdown.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/showdown/dist/showdown.min.js"></script>
</body>

</html>
